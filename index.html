<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <h1 class="game-title">TETRIS</h1>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <button id="theme-toggle" title="Cambiar tema">
            <span class="icon">&#9728;</span>
          </button>
        </div>

        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>
        <div class="panel-section">
          <span class="label">COMBO</span>
          <span class="value" id="combo">0</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>

        <div class="panel-section">
          <button id="reset-scores-btn" class="reset-btn" title="Borrar tabla de records">
            Reset Records
          </button>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>

        <!-- Name input section (shown only when score qualifies for top 5) -->
        <div id="name-input-section" class="name-input-section hidden">
          <p class="name-prompt">¡Entraste al Top 5! Ingresa tu nombre:</p>
          <input
            type="text"
            id="player-name-input"
            class="player-name-input"
            maxlength="20"
            placeholder="Tu nombre"
            autocomplete="off"
          />
          <button id="save-score-btn" class="save-btn">Guardar</button>
        </div>

        <!-- Highscores table (shown in game over overlay) -->
        <div id="overlay-highscores" class="overlay-highscores hidden">
          <p class="hs-title">TOP 5</p>
          <table id="overlay-hs-table" class="hs-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Nombre</th>
                <th>Score</th>
                <th>Líneas</th>
                <th>Combo</th>
              </tr>
            </thead>
            <tbody id="overlay-hs-body"></tbody>
          </table>
        </div>

        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>

    <!-- Start screen overlay (shown before first game) -->
    <div id="start-overlay" class="overlay">
      <div class="overlay-box start-box">
        <p id="start-title" class="start-title">TETRIS</p>
        <div id="start-highscores" class="overlay-highscores">
          <p class="hs-title">TOP 5</p>
          <table class="hs-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Nombre</th>
                <th>Score</th>
                <th>Líneas</th>
                <th>Combo</th>
              </tr>
            </thead>
            <tbody id="start-hs-body"></tbody>
          </table>
        </div>
        <button id="start-btn" class="save-btn start-play-btn">¡Jugar!</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
